<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>signup form</title>
    <style>
      body {
        font-family: Arial, Helvetica, sans-serif;
        background-color: black;
        margin: 0;
        padding: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      .card {
        background-color: #cdc1c1;
        border-radius: 8px;
        padding: 20px;
        width: 300px;
      
      }
      h2 {
        color: #1a50a0;
        text-align: center;
        margin-bottom: 20px;
      }

      .form1 {
        display: flex;
        flex-direction: column;
      }
      .form2 {
        display: flex;
        flex-direction: row;
        margin-bottom: 6px;
      }
      .form3 {
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      input {
        padding: 10px;
        margin-bottom: 10px;
        border: 1px solid #ccc;
        border-radius: 4px;
      }
      button {
        padding: 10px;
        background-color: green;
        color: white;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        margin-top: 6px;
      }
      button:hover {
        background-color: greenyellow;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h2>SIGN UP</h2>
      <form class="form1">
        <input type="email" placeholder="Email" />
      </form>
      <form class="form2">
        <input style="width: 120px" type="text" placeholder="First name" />
        <input
          style="width: 115px; margin-left: 20px"
          type="text"
          placeholder="Last name"
        />
      </form>
      <form class="form3">
        <input style="width: 160px" type="password" placeholder="Password" />
        <button style="width: 140px;" type="submit">
          <strong>Sign Up</strong>
        </button>
      </form>

      <a href="login.html" target="_blank">
        <button style="width: 120px; margin-left: 90px;" type="submit">
          Login
        </button></a
      >
    </div>
  </body>
</html>
